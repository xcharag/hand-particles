<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromoUPSA 2026</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: Arial, sans-serif; }
    canvas { display: block; }
    video  { display: none; }

    #bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 6px;
      padding: 10px 12px 14px;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      z-index: 10;
    }
    .btn {
      cursor: pointer;
      padding: 5px 13px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 20px;
      color: rgba(255,255,255,0.4);
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      background: rgba(255,255,255,0.04);
      transition: all .18s;
      user-select: none;
    }
    .btn:hover { color: rgba(255,255,255,0.85); background: rgba(255,255,255,0.1); }
    .btn.active {
      color: #fff;
      border-color: rgba(255,255,255,0.65);
      background: rgba(255,255,255,0.14);
      box-shadow: 0 0 14px rgba(255,255,255,0.18);
    }

    #subbar {
      position: fixed;
      bottom: 52px; left: 0; right: 0;
      display: flex;
      justify-content: center;
      gap: 6px;
      padding: 4px 12px;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity .28s;
    }
    #subbar.show { opacity: 1; pointer-events: all; }
    .fbtn.active {
      color: #fff;
      border-color: rgba(255,210,80,0.75) !important;
      background: rgba(255,210,80,0.1) !important;
      box-shadow: 0 0 14px rgba(255,210,80,0.25) !important;
    }

    #ov {
      position: fixed; inset: 0;
      background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; z-index: 20;
      transition: opacity .7s;
    }
    #ov.gone { opacity: 0; pointer-events: none; }
    #ov span { color: rgba(255,255,255,0.4); font-size: 13px; letter-spacing: 3px; text-transform: uppercase; }
    .ring {
      width: 32px; height: 32px;
      border: 2px solid rgba(80,180,255,.15);
      border-top-color: rgba(80,180,255,.85);
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="ov"><div class="ring"></div><span>Cargando</span></div>
<canvas id="c"></canvas>
<video  id="v" autoplay playsinline muted></video>
<div    id="subbar"></div>
<div    id="bar"></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"
        crossorigin="anonymous"></script>

<script>
'use strict';

/* ═══════════════════════════════════════════════════════════════
   SETUP
═══════════════════════════════════════════════════════════════ */
const c   = document.getElementById('c');
const ctx = c.getContext('2d');
const vid = document.getElementById('v');
const bar = document.getElementById('bar');
const ov  = document.getElementById('ov');

let W = c.width  = window.innerWidth;
let H = c.height = window.innerHeight;
let T = 0; // frame counter

let landmarks = null; // [{x,y,z,sx,sy}, ...]

// hand bone connections (MediaPipe topology)
const CONN = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],
  [0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],
  [5,9],[9,13],[13,17]
];

/* ═══════════════════════════════════════════════════════════════
   MODES
═══════════════════════════════════════════════════════════════ */
const MODE_LIST = [
  { id:'particles', label:'① Particles' },
  { id:'garden',    label:'② Garden'    },
  { id:'skeleton',  label:'③ Skeleton'  },
  { id:'mirror',    label:'④ Mirror'    },
  { id:'fire',      label:'⑤ Fire'      },
  { id:'matrix',    label:'⑥ Matrix'    },
  { id:'binary',    label:'⑦ Binary'    },
];
let mode = 'particles';

/* ═══════════════════════════════════════════════════════════════
   SHARED WATERMARK
═══════════════════════════════════════════════════════════════ */
function drawWatermark(alpha) {
  const a = alpha || 0.08;
  const cx = W/2, cy = H/2;
  const fs1 = Math.min(W/8.5, 115);
  const fs2 = Math.min(W/5.5, 175);
  ctx.save();
  ctx.globalCompositeOperation = 'source-over';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowBlur = 40;
  ctx.shadowColor = `rgba(120,200,255,${a*3})`;
  ctx.fillStyle   = `rgba(200,230,255,${a})`;
  ctx.font = `900 ${fs1}px Arial`;
  ctx.fillText('PromoUPSA', cx, cy - fs1*0.82);
  ctx.font = `900 ${fs2}px Arial`;
  ctx.fillText('2026', cx, cy + fs2*0.52);
  ctx.restore();
}

/* ═══════════════════════════════════════════════════════════════
   MODE 1 — PARTICLES
   3000 partículas forman "PromoUPSA 2026", huyen de la mano
═══════════════════════════════════════════════════════════════ */
const PCOUNT = 3000;
let particles = [];

function Particle(hx, hy, isText) {
  this.hx = hx; this.hy = hy;
  this.x  = Math.random() * W;
  this.y  = Math.random() * H;
  this.vx = 0; this.vy = 0;
  if (isText) {
    this.r      = 1.2 + Math.random() * 2.2;
    this.alpha  = 0.8 + Math.random() * 0.2;
    this.baseH  = Math.random() < 0.55 ? 200 + Math.random()*50 : 38 + Math.random()*18;
    this.spring = 0.055;
    this.rR = 145; this.rStr = 11;
  } else {
    this.r      = 0.3 + Math.random() * 1;
    this.alpha  = 0.04 + Math.random() * 0.14;
    this.baseH  = 195 + Math.random() * 65;
    this.spring = 0.006;
    this.rR = 70; this.rStr = 3;
  }
  this.h = this.baseH;
  this.lit = 65;
}

Particle.prototype.update = function() {
  this.vx += (this.hx - this.x) * this.spring;
  this.vy += (this.hy - this.y) * this.spring;
  let push = 0;
  if (landmarks) {
    for (let i = 0; i < landmarks.length; i++) {
      const lm = landmarks[i];
      const dx = this.x - lm.sx, dy = this.y - lm.sy;
      const d2 = dx*dx + dy*dy;
      if (d2 < this.rR*this.rR && d2 > 0.01) {
        const d = Math.sqrt(d2), f = (this.rR-d)/this.rR;
        this.vx += (dx/d)*f*this.rStr;
        this.vy += (dy/d)*f*this.rStr;
        if (f > push) push = f;
      }
    }
  }
  const tH = push > 0 ? this.baseH - push*160 : this.baseH;
  const tL = push > 0 ? 65 + push*35           : 65;
  this.h   += (tH - this.h)   * 0.1;
  this.lit += (tL - this.lit) * 0.1;
  this.vx *= 0.86; this.vy *= 0.86;
  this.x  += this.vx; this.y  += this.vy;
};

Particle.prototype.draw = function() {
  ctx.beginPath();
  ctx.arc(this.x, this.y, this.r*3.5, 0, 6.2832);
  ctx.fillStyle = `hsla(${this.h},100%,${this.lit}%,${this.alpha*0.13})`;
  ctx.fill();
  ctx.beginPath();
  ctx.arc(this.x, this.y, this.r, 0, 6.2832);
  ctx.fillStyle = `hsla(${this.h},100%,${this.lit+10}%,${this.alpha})`;
  ctx.fill();
};

function sampleText() {
  const off = document.createElement('canvas');
  off.width = W; off.height = H;
  const o   = off.getContext('2d');
  const cx  = W/2, cy = H/2;
  const fs1 = Math.min(W/8.5, 115);
  const fs2 = Math.min(W/5.5, 175);
  o.textAlign = 'center'; o.textBaseline = 'middle'; o.fillStyle = '#fff';
  o.font = `900 ${fs1}px Arial`; o.fillText('PromoUPSA', cx, cy - fs1*0.82);
  o.font = `900 ${fs2}px Arial`; o.fillText('2026',      cx, cy + fs2*0.52);
  const px   = o.getImageData(0, 0, W, H).data;
  const step = Math.max(3, Math.floor(Math.sqrt(W*H/45000)));
  const out  = [];
  for (let y = 0; y < H; y += step)
    for (let x = 0; x < W; x += step)
      if (px[(y*W+x)*4+3] > 128) out.push(x, y);
  for (let i = out.length/2-1; i > 0; i--) {
    const j = (Math.random()*(i+1))|0;
    const tx = out[i*2], ty = out[i*2+1];
    out[i*2] = out[j*2]; out[i*2+1] = out[j*2+1];
    out[j*2] = tx;       out[j*2+1] = ty;
  }
  return out;
}

function initParticles() {
  const pts   = sampleText();
  const textN = Math.min((PCOUNT*0.75)|0, pts.length/2);
  particles   = new Array(PCOUNT);
  for (let i = 0; i < PCOUNT; i++)
    particles[i] = i < textN
      ? new Particle(pts[i*2], pts[i*2+1], true)
      : new Particle(Math.random()*W, Math.random()*H, false);
}

function renderParticles() {
  drawWatermark(0.11);
  ctx.globalCompositeOperation = 'lighter';
  for (let i = 0; i < particles.length; i++) {
    particles[i].update();
    particles[i].draw();
  }
  ctx.globalCompositeOperation = 'source-over';
}

/* ═══════════════════════════════════════════════════════════════
   MODE 2 — GARDEN
   Flor en la palma reacciona a la apertura de la mano
   Puño = capullo cerrado · Abriendo = pétalos uno a uno · Abierta = plena floración
═══════════════════════════════════════════════════════════════ */
let gardenOpen = [0, 0]; // apertura suavizada por mano (hasta 2)

/* Devuelve 0 (puño) → 1 (mano abierta)
   Métrica: distancia promedio yemas↔centro palma, normalizada por tamaño de mano */
function measureOpen(lms) {
  let pcx = 0, pcy = 0;
  [0, 5, 9, 13, 17].forEach(i => { pcx += lms[i].sx; pcy += lms[i].sy; });
  pcx /= 5; pcy /= 5;
  const ref = Math.hypot(lms[9].sx - lms[0].sx, lms[9].sy - lms[0].sy) || 100;
  let d = 0;
  [4, 8, 12, 16, 20].forEach(i => d += Math.hypot(lms[i].sx - pcx, lms[i].sy - pcy));
  return Math.max(0, Math.min(1, (d/5/ref - 0.55) / 1.65));
}

/* Dibuja un pétalo (bezier de doble curva) desde (cx,cy) en dirección angle */
function drawPetal(cx, cy, angle, len, width, hue, alpha) {
  const tx   = cx + Math.cos(angle)*len;
  const ty   = cy + Math.sin(angle)*len;
  const perp = angle + Math.PI/2;
  const m    = 0.52;
  const cp1x = cx + Math.cos(angle)*len*m + Math.cos(perp)*width;
  const cp1y = cy + Math.sin(angle)*len*m + Math.sin(perp)*width;
  const cp2x = cx + Math.cos(angle)*len*m - Math.cos(perp)*width;
  const cp2y = cy + Math.sin(angle)*len*m - Math.sin(perp)*width;

  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.bezierCurveTo(cp1x, cp1y, tx, ty, tx, ty);
  ctx.bezierCurveTo(cp2x, cp2y, cx, cy, cx, cy);
  ctx.fillStyle   = `hsla(${hue},90%,65%,${alpha})`;
  ctx.fill();
  ctx.strokeStyle = `hsla(${hue+28},100%,88%,${alpha*0.4})`;
  ctx.lineWidth   = 0.6;
  ctx.stroke();
}

/* Tipos de flor */
const FLOWER_DEFS = [
  { label:'Q · Orquídea' },
  { label:'W · Gerbera'  },
  { label:'E · Tajibo 🇧🇴'},
  { label:'R · Jardín'   },
];
let flowerIdx = 0;

/* Núcleo compartido: estambre, capullo y destellos */
function flowerCore(cx, cy, open, scale, budHue, sparkHue) {
  const cr = scale*(0.04+open*0.09);
  const g  = ctx.createRadialGradient(cx,cy,0,cx,cy,cr*2.8);
  g.addColorStop(0,   `hsla(55,100%,98%,${0.65+open*0.35})`);
  g.addColorStop(0.4, `hsla(44,100%,78%,${0.45+open*0.45})`);
  g.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.arc(cx,cy,cr*2.8,0,6.2832); ctx.fillStyle=g; ctx.fill();

  if (open < 0.32) {
    const bt=1-open/0.32;
    ctx.beginPath();
    ctx.ellipse(cx,cy-scale*0.09*bt,scale*0.1*bt,scale*0.22*bt,0,0,6.2832);
    ctx.fillStyle=`hsla(${budHue},70%,28%,${0.55*bt})`;
    ctx.strokeStyle=`hsla(${budHue+15},80%,52%,${0.7*bt})`;
    ctx.lineWidth=1.2; ctx.fill(); ctx.stroke();
    for (let s=0;s<3;s++) {
      const sa=s/3*Math.PI*2-Math.PI/2+0.3;
      ctx.beginPath();
      ctx.moveTo(cx,cy+scale*0.05*bt);
      ctx.quadraticCurveTo(
        cx+Math.cos(sa)*scale*0.14*bt,cy+Math.sin(sa)*scale*0.14*bt,
        cx+Math.cos(sa)*scale*0.06*bt,cy+Math.sin(sa)*scale*0.06*bt-scale*0.12*bt
      );
      ctx.strokeStyle=`hsla(${budHue},80%,45%,${0.55*bt})`; ctx.lineWidth=1.5; ctx.stroke();
    }
  }
  if (open > 0.85) {
    const a=(open-0.85)/0.15;
    for (let s=0;s<14;s++) {
      const sa=s/14*Math.PI*2+T*0.014;
      const sr=scale*(0.78+Math.sin(T*0.055+s)*0.18);
      ctx.beginPath(); ctx.arc(cx+Math.cos(sa)*sr,cy+Math.sin(sa)*sr,1.8,0,6.2832);
      ctx.fillStyle=`hsla(${sparkHue},100%,90%,${a*0.88})`; ctx.fill();
    }
  }
}

/* ── ORQUÍDEA: magenta, blanco, púrpura ── */
function drawOrchid(cx, cy, open, scale) {
  // sépalo dorsal (arriba)
  const s0=Math.min(1,open/0.7);
  if (s0>0.01) drawPetal(cx,cy,-Math.PI/2,scale*(0.06+s0*0.88),scale*(0.013+s0*0.17),290,0.15+s0*0.75);
  // 2 pétalos ala (más grandes, los más laterales)
  const wings=[[-Math.PI/2+1.1],[-Math.PI/2-1.1]];
  wings.forEach(([ang],i)=>{
    const s=Math.max(0,Math.min(1,(open-0.08)*1.25));
    if (s<0.01) return;
    drawPetal(cx,cy,ang,scale*(0.05+s*1.05),scale*(0.025+s*0.42),i?295:308,0.12+s*0.78);
  });
  // 2 sépalos laterales inferiores (estrechos)
  [Math.PI/2+0.52,Math.PI/2-0.52].forEach(ang=>{
    const s=Math.max(0,Math.min(1,(open-0.05)*1.2));
    if (s<0.01) return;
    drawPetal(cx,cy,ang,scale*(0.04+s*0.65),scale*(0.007+s*0.09),280,0.1+s*0.52);
  });
  // labellum (labio — más ancho, blanco con magenta)
  const sl=Math.max(0,Math.min(1,(open-0.15)*1.2));
  if (sl>0.01) {
    drawPetal(cx,cy,Math.PI/2,scale*(0.05+sl*0.9),scale*(0.032+sl*0.44),318,0.15+sl*0.68);
    drawPetal(cx,cy,Math.PI/2,scale*(0.03+sl*0.55),scale*(0.018+sl*0.26),350,0.18+sl*0.72);
  }
  flowerCore(cx,cy,open,scale,130,310);
}

/* ── GERBERA: naranja, amarillo, rojo ── */
function drawGerbera(cx, cy, open, scale) {
  // anillo exterior: 20 pétalos finos
  for (let p=0;p<20;p++) {
    const st=(p/20)*0.15, s=open<=st?0:Math.min(1,(open-st)/(1-st));
    if (s<0.01) continue;
    drawPetal(cx,cy,(p/20)*Math.PI*2+T*0.002,scale*(0.06+s*0.98),scale*(0.007+s*0.088),18+p*3,0.2+s*0.72);
  }
  // anillo interior: 12 pétalos amarillos
  for (let p=0;p<12;p++) {
    const st=0.13+(p/12)*0.13, s=open<=st?0:Math.min(1,(open-st)/(1-st));
    if (s<0.01) continue;
    drawPetal(cx,cy,(p/12)*Math.PI*2+Math.PI/12+T*0.003,scale*(0.04+s*0.58),scale*(0.006+s*0.068),42+p*4,0.25+s*0.65);
  }
  // disco central oscuro
  if (open>0.05) {
    const dr=scale*(0.07+open*0.1);
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,dr);
    g.addColorStop(0,`rgba(55,12,0,${0.55+open*0.4})`);
    g.addColorStop(0.7,`rgba(95,28,0,${0.4+open*0.35})`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.arc(cx,cy,dr,0,6.2832); ctx.fillStyle=g; ctx.fill();
  }
  flowerCore(cx,cy,open,scale,25,40);
}

/* ── TAJIBO: amarillo intenso, dorado (flor nacional de Bolivia) ── */
function drawTajibo(cx, cy, open, scale) {
  for (let p=0;p<5;p++) {
    const st=(p/5)*0.2, s=open<=st?0:Math.min(1,(open-st)/(1-st));
    if (s<0.01) continue;
    const ang=(p/5)*Math.PI*2-Math.PI/2+T*0.005;
    const len=scale*(0.07+s*1.08), wid=scale*(0.03+s*0.44);
    const hue=44+p*3+Math.sin(T*0.03+p)*4;
    const tx=cx+Math.cos(ang)*len, ty=cy+Math.sin(ang)*len;
    const perp=ang+Math.PI/2, m=0.52;
    const cp1x=cx+Math.cos(ang)*len*m+Math.cos(perp)*wid, cp1y=cy+Math.sin(ang)*len*m+Math.sin(perp)*wid;
    const cp2x=cx+Math.cos(ang)*len*m-Math.cos(perp)*wid, cp2y=cy+Math.sin(ang)*len*m-Math.sin(perp)*wid;
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.bezierCurveTo(cp1x,cp1y,tx,ty,tx,ty);
    ctx.bezierCurveTo(cp2x,cp2y,cx,cy,cx,cy);
    ctx.fillStyle=`hsla(${hue},97%,${72+s*18}%,${0.2+s*0.78})`; ctx.fill();
    ctx.strokeStyle=`hsla(${hue-8},100%,92%,${s*0.35})`; ctx.lineWidth=0.7; ctx.stroke();
    if (s>0.3) { // vena central
      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(tx,ty);
      ctx.strokeStyle=`hsla(${hue+10},100%,97%,${(s-0.3)*0.3})`; ctx.lineWidth=0.5; ctx.stroke();
    }
  }
  flowerCore(cx,cy,open,scale,80,50);
}

/* ── JARDÍN GENÉRICA: cyan, blanco ── */
function drawGardenFlower(cx, cy, open, scale) {
  // 12 pétalos exteriores cyan
  for (let p=0;p<12;p++) {
    const st=(p/12)*0.13, s=open<=st?0:Math.min(1,(open-st)/(1-st));
    if (s<0.01) continue;
    drawPetal(cx,cy,(p/12)*Math.PI*2-Math.PI/2+T*0.003,scale*(0.06+s*0.98),scale*(0.014+s*0.21),178+p*7,0.18+s*0.74);
  }
  // 8 pétalos interiores blancos
  for (let p=0;p<8;p++) {
    const st=0.17+(p/8)*0.17, s=open<=st?0:Math.min(1,(open-st)/(1-st));
    if (s<0.01) continue;
    drawPetal(cx,cy,(p/8)*Math.PI*2-Math.PI/2+Math.PI/8+T*0.006,scale*(0.03+s*0.58),scale*(0.01+s*0.13),200,0.2+s*0.65);
  }
  flowerCore(cx,cy,open,scale,160,185);
}

/* Dispatcher */
function drawFlower(cx, cy, open, scale) {
  if      (flowerIdx===0) drawOrchid(cx,cy,open,scale);
  else if (flowerIdx===1) drawGerbera(cx,cy,open,scale);
  else if (flowerIdx===2) drawTajibo(cx,cy,open,scale);
  else                    drawGardenFlower(cx,cy,open,scale);
}

/* Zarcillos sutiles desde las yemas */
function tendril(x, y, angle, len, depth, hue) {
  if (depth <= 0 || len < 3) return;
  const ex = x + Math.cos(angle + Math.sin(T*0.018+depth)*0.28)*len;
  const ey = y + Math.sin(angle + Math.sin(T*0.018+depth)*0.28)*len;
  ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(ex, ey);
  ctx.strokeStyle = `hsla(${hue+depth*14},80%,55%,${depth/4*0.65})`;
  ctx.lineWidth   = depth*0.5; ctx.lineCap = 'round'; ctx.stroke();
  tendril(ex, ey, angle - 0.38, len*0.67, depth-1, hue);
  tendril(ex, ey, angle + 0.38, len*0.67, depth-1, hue);
}

function renderGarden() {
  ctx.globalCompositeOperation = 'lighter';

  if (landmarks) {
    const handsN = Math.floor(landmarks.length / 21);
    const tips = [4, 8, 12, 16, 20];
    const mids = [3, 7, 11, 15, 19];

    for (let h = 0; h < handsN; h++) {
      const lms = landmarks.slice(h*21, (h+1)*21);

      // Medir apertura y suavizar (lerp 12% por frame → transición ~8 frames)
      const raw = measureOpen(lms);
      gardenOpen[h] = (gardenOpen[h] || 0) + (raw - (gardenOpen[h] || 0)) * 0.12;
      const open = gardenOpen[h];

      // Centro de la palma
      let pcx = 0, pcy = 0;
      [0, 5, 9, 13, 17].forEach(i => { pcx += lms[i].sx; pcy += lms[i].sy; });
      pcx /= 5; pcy /= 5;

      // Escala: distancia muñeca→nudillo medio
      const scale = Math.hypot(lms[9].sx - lms[0].sx, lms[9].sy - lms[0].sy);

      // Zarcillos desde yemas (solo cuando la mano está algo abierta)
      if (open > 0.15) {
        tips.forEach((ti, fi) => {
          const tip = lms[ti], mid = lms[mids[fi]];
          const ang = Math.atan2(tip.sy-mid.sy, tip.sx-mid.sx) - Math.PI/2;
          tendril(tip.sx, tip.sy, ang, scale*0.3*open, 4, 80+fi*24);
        });
      }

      // Flor centrada en la palma
      drawFlower(pcx, pcy, open, scale);
    }
  } else {
    // Sin mano: capullo que respira suavemente
    const breathe = 0.12 + Math.sin(T*0.022)*0.08;
    drawFlower(W/2, H/2, breathe, 130);
  }

  ctx.globalCompositeOperation = 'source-over';
  drawWatermark();
}

/* ═══════════════════════════════════════════════════════════════
   MODE 3 — SKELETON
   Esqueleto neon muy detallado con glow pulsante
═══════════════════════════════════════════════════════════════ */
function renderSkeleton() {
  if (!landmarks) { drawWatermark(); return; }
  ctx.globalCompositeOperation = 'lighter';
  const handsN = Math.floor(landmarks.length/21);

  for (let h = 0; h < handsN; h++) {
    const lms = landmarks.slice(h*21, (h+1)*21);

    // bones
    CONN.forEach(([a, b]) => {
      const p1 = lms[a], p2 = lms[b];
      ctx.lineCap = 'round';
      // outer aura
      ctx.beginPath(); ctx.moveTo(p1.sx,p1.sy); ctx.lineTo(p2.sx,p2.sy);
      ctx.strokeStyle = 'rgba(0,255,255,0.07)';
      ctx.lineWidth = 18; ctx.stroke();
      // mid glow
      ctx.strokeStyle = 'rgba(0,220,255,0.22)';
      ctx.lineWidth = 7; ctx.stroke();
      // bright core
      ctx.strokeStyle = 'rgba(200,255,255,0.95)';
      ctx.lineWidth = 1.8; ctx.stroke();
    });

    // joints
    lms.forEach((lm, i) => {
      const isTip  = [4,8,12,16,20].includes(i);
      const isBase = [1,5,9,13,17].includes(i);
      const r      = isTip ? 8 : isBase ? 5.5 : 4;
      const pulse  = 1 + Math.sin(T*0.08 + i*0.35)*0.25;

      const g = ctx.createRadialGradient(lm.sx,lm.sy,0, lm.sx,lm.sy,r*3.5*pulse);
      g.addColorStop(0, isTip ? 'rgba(0,255,200,0.75)' : 'rgba(0,200,255,0.55)');
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.beginPath();
      ctx.arc(lm.sx, lm.sy, r*3.5*pulse, 0, 6.2832);
      ctx.fillStyle = g;
      ctx.fill();

      // bright dot
      ctx.beginPath();
      ctx.arc(lm.sx, lm.sy, isTip ? 2.5 : 1.8, 0, 6.2832);
      ctx.fillStyle = 'white';
      ctx.fill();
    });
  }

  ctx.globalCompositeOperation = 'source-over';
  drawWatermark();
}

/* ═══════════════════════════════════════════════════════════════
   MODE 4 — MIRROR
   Simetría 4-vías de la mano
═══════════════════════════════════════════════════════════════ */
function renderMirror() {
  if (!landmarks) { drawWatermark(); return; }
  ctx.globalCompositeOperation = 'lighter';

  const handsN = Math.floor(landmarks.length/21);
  // 4 reflections: original, flip-X, flip-Y, flip-both
  const ref = [[1,1],[-1,1],[1,-1],[-1,-1]];

  ref.forEach(([rx, ry], ri) => {
    const hue = ri*90 + T*0.25;
    for (let h = 0; h < handsN; h++) {
      const lms = landmarks.slice(h*21, (h+1)*21).map(lm => ({
        sx: rx === 1 ? lm.sx : W - lm.sx,
        sy: ry === 1 ? lm.sy : H - lm.sy,
      }));

      CONN.forEach(([a, b]) => {
        const p1 = lms[a], p2 = lms[b];
        ctx.beginPath(); ctx.moveTo(p1.sx,p1.sy); ctx.lineTo(p2.sx,p2.sy);
        ctx.strokeStyle = `hsla(${hue},90%,65%,0.35)`;
        ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.stroke();
        ctx.strokeStyle = `hsla(${hue},100%,88%,0.55)`;
        ctx.lineWidth = 0.8; ctx.stroke();
      });

      lms.forEach((lm, i) => {
        const r = [4,8,12,16,20].includes(i) ? 5 : 3;
        const g = ctx.createRadialGradient(lm.sx,lm.sy,0,lm.sx,lm.sy,r*3);
        g.addColorStop(0, `hsla(${hue},100%,70%,0.6)`);
        g.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.beginPath(); ctx.arc(lm.sx,lm.sy,r*3,0,6.2832);
        ctx.fillStyle = g; ctx.fill();
      });
    }
  });

  ctx.globalCompositeOperation = 'source-over';
  drawWatermark();
}

/* ═══════════════════════════════════════════════════════════════
   MODE 5 — FIRE
   Fuego naranja/rojo sale de las puntas de los dedos
═══════════════════════════════════════════════════════════════ */
let fp = [];

function FP(x, y) {
  this.x = x + (Math.random()-0.5)*10;
  this.y = y;
  this.vx = (Math.random()-0.5)*3.5;
  this.vy = -(Math.random()*5.5 + 2.5);
  this.life = 1;
  this.decay = 0.016 + Math.random()*0.024;
  this.r = Math.random()*5 + 2;
}
FP.prototype.update = function() {
  this.vx += (Math.random()-0.5)*0.55;
  this.vy -= 0.07;
  this.x  += this.vx;
  this.y  += this.vy;
  this.life -= this.decay;
};
FP.prototype.draw = function() {
  const age = 1 - this.life;
  const hue = age<0.25 ? 58 : age<0.55 ? 28 : age<0.8 ? 10 : 0;
  const lit = age<0.25 ? 96 : age<0.55 ? 72 : age<0.8 ? 52 : 30;
  const sz  = this.r * this.life;
  const g   = ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,sz*3.5);
  g.addColorStop(0, `hsla(${hue},100%,${lit+8}%,${this.life*0.45})`);
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.arc(this.x,this.y,sz*3.5,0,6.2832);
  ctx.fillStyle = g; ctx.fill();
  ctx.beginPath(); ctx.arc(this.x,this.y,sz,0,6.2832);
  ctx.fillStyle = `hsla(${hue},100%,${lit}%,${this.life*0.9})`;
  ctx.fill();
};

function renderFire() {
  ctx.globalCompositeOperation = 'lighter';
  if (landmarks) {
    const handsN = Math.floor(landmarks.length/21);
    for (let h = 0; h < handsN; h++) {
      [4,8,12,16,20].forEach(ti => {
        const lm = landmarks[h*21+ti];
        for (let j = 0; j < 9; j++) fp.push(new FP(lm.sx, lm.sy));
      });
    }
  }
  fp = fp.filter(p => { p.update(); if(p.life>0){p.draw();return true;} return false; });
  ctx.globalCompositeOperation = 'source-over';
  drawWatermark();
}

/* ═══════════════════════════════════════════════════════════════
   MODE 6 — MATRIX
   Lluvia de caracteres ASCII, la mano los perturba
═══════════════════════════════════════════════════════════════ */
const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&<>{}[]/\\ｦｧｨｩｪｫｬｭｮｯｰｱｲｳｴｵカキクケコ'.split('');
const COL_W  = 18;
let mcols    = [];

function initMatrix() {
  const n = Math.ceil(W/COL_W);
  mcols = Array.from({length: n}, () => ({
    y:     -Math.random()*H,
    speed: 1.5 + Math.random()*2,
    len:   (18 + Math.random()*18)|0,
    trail: [],
  }));
  mcols.forEach(col => {
    col.trail = Array.from({length: col.len}, () => CHARS[Math.random()*CHARS.length|0]);
  });
}

function renderMatrix() {
  ctx.globalCompositeOperation = 'source-over';
  ctx.font = `${COL_W-2}px monospace`;

  mcols.forEach((col, ci) => {
    const x = ci*COL_W + 2;
    let nearHand = false;
    if (landmarks) {
      for (let i = 0; i < landmarks.length; i++)
        if (Math.abs(landmarks[i].sx - x) < 60) { nearHand = true; break; }
    }

    col.speed = nearHand ? 6 + Math.random()*4 : 1.5 + Math.random();
    if (nearHand && Math.random() < 0.35)
      col.trail[Math.random()*col.trail.length|0] = CHARS[Math.random()*CHARS.length|0];

    col.trail.forEach((ch, i) => {
      const py = col.y - i*COL_W;
      if (py < -COL_W || py > H+COL_W) return;
      const fade   = Math.max(0, 1 - i/col.len);
      const isHead = i === 0;
      if (nearHand) {
        ctx.fillStyle = isHead
          ? 'rgba(255,200,80,1)'
          : `rgba(255,${(120+fade*80)|0},0,${fade*0.8})`;
      } else {
        ctx.fillStyle = isHead
          ? 'rgba(180,255,180,1)'
          : `rgba(0,${(180*fade+40)|0},0,${fade*0.85})`;
      }
      ctx.fillText(ch, x, py);
    });

    col.y += col.speed;
    if (col.y > H + col.len*COL_W) {
      col.y = -col.len*COL_W;
      col.trail = Array.from({length: col.len}, () => CHARS[Math.random()*CHARS.length|0]);
    }
    if (Math.random() < 0.04)
      col.trail[Math.random()*col.trail.length|0] = CHARS[Math.random()*CHARS.length|0];
  });

  drawWatermark();
}

/* ═══════════════════════════════════════════════════════════════
   MODE 7 — BINARY
   Objetos se llenan con 1s y 0s estilo máquina de escribir
═══════════════════════════════════════════════════════════════ */
const CELL = 20;
let bcells = [];
let boff   = null;
let boctx  = null;

function initBinary() {
  const cols = Math.ceil(W/CELL), rows = Math.ceil(H/CELL);
  bcells = Array.from({length: rows}, (_, r) =>
    Array.from({length: cols}, (_, c) => ({
      x: c*CELL, y: r*CELL, ch: '0', a: 0, ta: 0, tick: (Math.random()*20)|0
    }))
  );
  boff  = document.createElement('canvas');
  boff.width  = cols;
  boff.height = rows;
  boctx = boff.getContext('2d');
}

function renderBinary() {
  // sample camera at grid resolution
  boctx.save();
  boctx.scale(-1, 1);
  boctx.translate(-boff.width, 0);
  boctx.drawImage(vid, 0, 0, boff.width, boff.height);
  boctx.restore();
  const px = boctx.getImageData(0, 0, boff.width, boff.height).data;

  ctx.globalCompositeOperation = 'source-over';
  ctx.font = `bold ${CELL-3}px monospace`;

  bcells.forEach((row, ri) => {
    row.forEach((cell, ci) => {
      const idx    = (ri*row.length + ci)*4;
      const bright = (px[idx]+px[idx+1]+px[idx+2]) / 765;
      let near = false;
      if (landmarks) {
        for (let i = 0; i < landmarks.length; i++)
          if (Math.abs(landmarks[i].sx-cell.x)<CELL*3.5 &&
              Math.abs(landmarks[i].sy-cell.y)<CELL*3.5) { near=true; break; }
      }
      cell.ta  = near ? 1 : bright > 0.28 ? bright*0.88 : 0;
      cell.a  += (cell.ta - cell.a) * 0.07;
      if (cell.a < 0.04) return;
      cell.tick++;
      if (cell.tick % 10 === 0) cell.ch = Math.random() < 0.5 ? '1' : '0';
      ctx.fillStyle = near
        ? `rgba(255,140,0,${cell.a})`
        : `rgba(0,${(200+bright*55)|0},0,${cell.a})`;
      ctx.fillText(cell.ch, cell.x+1, cell.y+CELL-3);
    });
  });

  drawWatermark();
}

/* ═══════════════════════════════════════════════════════════════
   MAIN LOOP
═══════════════════════════════════════════════════════════════ */
const KEY_LM = [0,4,8,12,16,20];

function frame() {
  T++;

  // camera background (mirrored)
  ctx.save();
  ctx.scale(-1,1); ctx.translate(-W,0);
  ctx.drawImage(vid, 0, 0, W, H);
  ctx.restore();

  // subtle dark overlay
  ctx.fillStyle = 'rgba(0,0,10,0.22)';
  ctx.fillRect(0, 0, W, H);

  // active mode
  switch(mode) {
    case 'particles': renderParticles(); break;
    case 'garden':    renderGarden();    break;
    case 'skeleton':  renderSkeleton();  break;
    case 'mirror':    renderMirror();    break;
    case 'fire':      renderFire();      break;
    case 'matrix':    renderMatrix();    break;
    case 'binary':    renderBinary();    break;
  }

  // fingertip glow (todos los modos excepto skeleton que ya lo hace)
  if (landmarks && mode !== 'skeleton') {
    ctx.globalCompositeOperation = 'lighter';
    const handsN = Math.floor(landmarks.length/21);
    for (let h = 0; h < handsN; h++) {
      KEY_LM.forEach(ki => {
        const lm = landmarks[h*21+ki];
        if (!lm) return;
        const g = ctx.createRadialGradient(lm.sx,lm.sy,0,lm.sx,lm.sy,22);
        g.addColorStop(0,'rgba(120,205,255,0.28)');
        g.addColorStop(1,'rgba(0,0,0,0)');
        ctx.beginPath(); ctx.arc(lm.sx,lm.sy,22,0,6.2832);
        ctx.fillStyle = g; ctx.fill();
      });
    }
    ctx.globalCompositeOperation = 'source-over';
  }

  requestAnimationFrame(frame);
}

/* ═══════════════════════════════════════════════════════════════
   RESIZE
═══════════════════════════════════════════════════════════════ */
function onResize() {
  W = c.width  = window.innerWidth;
  H = c.height = window.innerHeight;
  initParticles();
  initMatrix();
  initBinary();
}
window.addEventListener('resize', onResize);

/* ═══════════════════════════════════════════════════════════════
   MEDIAPIPE
═══════════════════════════════════════════════════════════════ */
function buildHands() {
  const mp = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
  });
  mp.setOptions({
    maxNumHands: 2, modelComplexity: 1,
    minDetectionConfidence: 0.6, minTrackingConfidence: 0.5
  });
  mp.onResults(r => {
    landmarks = r.multiHandLandmarks?.length
      ? r.multiHandLandmarks.flat().map(lm => ({
          ...lm,
          sx: (1-lm.x)*W,
          sy: lm.y*H
        }))
      : null;
  });
  return mp;
}

async function startCam(mp) {
  try {
    const cam = new Camera(vid, {
      onFrame: async () => mp.send({image: vid}),
      width: 640, height: 480
    });
    await cam.start();
  } catch(e) {
    console.warn('Camera:', e.message);
  }
  ov.classList.add('gone');
  setTimeout(() => ov.remove(), 750);
}

/* ═══════════════════════════════════════════════════════════════
   UI — BOTONES + TECLADO
═══════════════════════════════════════════════════════════════ */
const subbar = document.getElementById('subbar');

function setFlower(i) {
  flowerIdx = i;
  document.querySelectorAll('.fbtn').forEach(b =>
    b.classList.toggle('active', +b.dataset.fi === i)
  );
}

function setMode(id) {
  mode = id;
  document.querySelectorAll('.btn').forEach(b =>
    b.classList.toggle('active', b.dataset.id === id)
  );
  subbar.classList.toggle('show', id === 'garden');
}

MODE_LIST.forEach(({id, label}) => {
  const btn = document.createElement('div');
  btn.className   = 'btn' + (id === mode ? ' active' : '');
  btn.dataset.id  = id;
  btn.textContent = label;
  btn.onclick     = () => setMode(id);
  bar.appendChild(btn);
});

FLOWER_DEFS.forEach(({label}, i) => {
  const btn = document.createElement('div');
  btn.className   = 'btn fbtn' + (i === 0 ? ' active' : '');
  btn.dataset.fi  = i;
  btn.textContent = label;
  btn.onclick     = () => setFlower(i);
  subbar.appendChild(btn);
});

window.addEventListener('keydown', e => {
  const k = e.key;
  const modeIdx = parseInt(k) - 1;
  if (modeIdx >= 0 && modeIdx < MODE_LIST.length) { setMode(MODE_LIST[modeIdx].id); return; }
  if (k==='q'||k==='Q') setFlower(0);
  if (k==='w'||k==='W') setFlower(1);
  if (k==='e'||k==='E') setFlower(2);
  if (k==='r'||k==='R') setFlower(3);
});

/* ═══════════════════════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════════════════════ */
initParticles();
initMatrix();
initBinary();
frame();
startCam(buildHands());
</script>
</body>
