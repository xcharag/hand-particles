<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromoUPSA 2026</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
    video  { display: none; }

    #tip {
      position: fixed;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.35);
      font: 12px/1 'Arial', sans-serif;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      white-space: nowrap;
      pointer-events: none;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 9;
      transition: opacity .7s;
    }
    #overlay.gone { opacity: 0; pointer-events: none; }
    #overlay span {
      color: rgba(255,255,255,0.4);
      font: 13px/1 'Arial', sans-serif;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .ring {
      width: 32px; height: 32px;
      border: 2px solid rgba(80,180,255,.15);
      border-top-color: rgba(80,180,255,.85);
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="overlay"><div class="ring"></div><span>Cargando</span></div>
<canvas id="c"></canvas>
<video  id="v" autoplay playsinline muted></video>
<div    id="tip">Iniciando…</div>

<!-- CDNs exactos -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"
        crossorigin="anonymous"></script>

<script>
'use strict';

/* ── elementos ─────────────────────────────────── */
const c   = document.getElementById('c');
const ctx = c.getContext('2d');
const vid = document.getElementById('v');
const tip = document.getElementById('tip');
const ov  = document.getElementById('overlay');

/* ── dimensiones ───────────────────────────────── */
let W = 0, H = 0;

/* ── estado global ─────────────────────────────── */
const N          = 3000;
const TEXT_SHARE = 0.75;   // fracción de partículas ancladas al texto

let pts       = [];        // array plano [x0,y0, x1,y1, ...]
let landmarks = null;      // [{x,y,z} …] normalizados 0-1, ya espejeados

/* ── clase Particle ────────────────────────────── */
function Particle(hx, hy, isText) {
  this.hx = hx;  this.hy = hy;
  this.x  = Math.random() * W;
  this.y  = Math.random() * H;
  this.vx = 0;   this.vy = 0;

  if (isText) {
    this.r       = 1.1 + Math.random() * 2;
    this.alpha   = 0.75 + Math.random() * 0.25;
    this.baseHue = Math.random() < 0.55
                   ? 200 + Math.random() * 50   /* azul → cian */
                   :  38 + Math.random() * 18;  /* dorado */
    this.spring  = 0.052;
    this.rR      = 145;
    this.rStr    = 11;
  } else {
    this.r       = 0.3 + Math.random() * 1;
    this.alpha   = 0.04 + Math.random() * 0.16;
    this.baseHue = 195 + Math.random() * 65;
    this.spring  = 0.006;
    this.rR      = 70;
    this.rStr    = 3;
  }

  this.hue = this.baseHue;
  this.lit = 65;
}

Particle.prototype.update = function () {
  /* spring hacia home */
  this.vx += (this.hx - this.x) * this.spring;
  this.vy += (this.hy - this.y) * this.spring;

  /* repulsión de la mano */
  let maxPush = 0;
  if (landmarks) {
    const R = this.rR, S = this.rStr;
    for (let i = 0; i < landmarks.length; i++) {
      const lm = landmarks[i];
      const dx = this.x - lm.sx;   /* sx/sy ya están en píxeles */
      const dy = this.y - lm.sy;
      const d2 = dx * dx + dy * dy;
      if (d2 < R * R && d2 > 0.01) {
        const d = Math.sqrt(d2);
        const f = (R - d) / R;
        this.vx += (dx / d) * f * S;
        this.vy += (dy / d) * f * S;
        if (f > maxPush) maxPush = f;
      }
    }
  }

  /* cambio de color según perturbación */
  const tH = maxPush > 0 ? this.baseHue - maxPush * 160 : this.baseHue;
  const tL = maxPush > 0 ? 65 + maxPush * 35             : 65;
  this.hue += (tH - this.hue) * 0.1;
  this.lit += (tL - this.lit) * 0.1;

  this.vx *= 0.86;
  this.vy *= 0.86;
  this.x  += this.vx;
  this.y  += this.vy;
};

Particle.prototype.draw = function () {
  ctx.beginPath();
  ctx.arc(this.x, this.y, this.r, 0, 6.2832);
  ctx.fillStyle = `hsla(${this.hue},82%,${this.lit}%,${this.alpha})`;
  ctx.fill();
};

/* ── muestreo de texto ─────────────────────────── */
function sampleText() {
  const off   = document.createElement('canvas');
  off.width   = W;  off.height = H;
  const o     = off.getContext('2d');
  const cx    = W / 2, cy = H / 2;
  const fs1   = Math.min(W / 8.5,  115);
  const fs2   = Math.min(W / 5.5,  175);

  o.textAlign    = 'center';
  o.textBaseline = 'middle';
  o.fillStyle    = '#fff';
  o.font         = `900 ${fs1}px Arial`;
  o.fillText('PromoUPSA', cx, cy - fs1 * 0.82);
  o.font         = `900 ${fs2}px Arial`;
  o.fillText('2026', cx, cy + fs2 * 0.52);

  const px   = o.getImageData(0, 0, W, H).data;
  const step = Math.max(3, Math.floor(Math.sqrt((W * H) / 45000)));
  const out  = [];

  for (let y = 0; y < H; y += step)
    for (let x = 0; x < W; x += step)
      if (px[(y * W + x) * 4 + 3] > 128)
        out.push(x, y);

  /* Fisher-Yates sobre pares */
  for (let i = out.length / 2 - 1; i > 0; i--) {
    const j  = (Math.random() * (i + 1)) | 0;
    const tx = out[i*2], ty = out[i*2+1];
    out[i*2] = out[j*2];  out[i*2+1] = out[j*2+1];
    out[j*2] = tx;         out[j*2+1] = ty;
  }
  return out;
}

/* ── inicialización ────────────────────────────── */
function init() {
  W = c.width  = window.innerWidth;
  H = c.height = window.innerHeight;

  pts = sampleText();
  const textN = Math.min((N * TEXT_SHARE) | 0, pts.length / 2);
  const arr   = new Array(N);

  for (let i = 0; i < N; i++) {
    arr[i] = i < textN
      ? new Particle(pts[i * 2], pts[i * 2 + 1], true)
      : new Particle(Math.random() * W, Math.random() * H, false);
  }
  return arr;
}

let particles = init();
window.addEventListener('resize', () => { particles = init(); });

/* ── bucle de render ───────────────────────────── */
const KEY = [0, 4, 8, 12, 16, 20]; // muñeca + puntas de dedos

function frame() {
  /* cámara en tiempo real como fondo (espejada igual que los landmarks) */
  ctx.save();
  ctx.scale(-1, 1);
  ctx.translate(-W, 0);
  ctx.drawImage(vid, 0, 0, W, H);
  ctx.restore();

  /* overlay oscuro suave para que las partículas resalten */
  ctx.fillStyle = 'rgba(0,0,10,0.35)';
  ctx.fillRect(0, 0, W, H);

  for (let i = 0; i < particles.length; i++) {
    particles[i].update();
    particles[i].draw();
  }

  /* glow en puntos clave de cada mano */
  if (landmarks) {
    const handsN = landmarks.length / 21;
    for (let h = 0; h < handsN; h++) {
      for (let k = 0; k < KEY.length; k++) {
        const lm = landmarks[h * 21 + KEY[k]];
        if (!lm) continue;
        const g = ctx.createRadialGradient(lm.sx, lm.sy, 0, lm.sx, lm.sy, 24);
        g.addColorStop(0, 'rgba(120,205,255,0.3)');
        g.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.beginPath();
        ctx.arc(lm.sx, lm.sy, 24, 0, 6.2832);
        ctx.fillStyle = g;
        ctx.fill();
      }
    }
  }

  requestAnimationFrame(frame);
}
frame();

/* ── MediaPipe Hands ───────────────────────────── */
function buildHands() {
  const mp = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
  });

  mp.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.6,
    minTrackingConfidence: 0.5
  });

  mp.onResults(r => {
    if (r.multiHandLandmarks && r.multiHandLandmarks.length) {
      /* aplanar todas las manos y precalcular coordenadas en píxeles */
      landmarks = r.multiHandLandmarks.flat().map(lm => ({
        x: lm.x, y: lm.y, z: lm.z,
        sx: (1 - lm.x) * W,  /* espejo (vista selfie) */
        sy: lm.y * H
      }));
      tip.textContent = '✋  mano detectada — movela para interactuar';
    } else {
      landmarks = null;
      tip.textContent = 'Acercá tu mano a la cámara';
    }
  });

  return mp;
}

/* ── cámara ────────────────────────────────────── */
async function startCam(mp) {
  try {
    const cam = new Camera(vid, {
      onFrame: async () => mp.send({ image: vid }),
      width: 640,
      height: 480
    });
    await cam.start();
    tip.textContent = 'Acercá tu mano a la cámara';
  } catch (err) {
    tip.textContent = 'Sin cámara — partículas activas';
    console.warn('Camera:', err.message);
  }
  ov.classList.add('gone');
  setTimeout(() => ov.remove(), 750);
}

startCam(buildHands());
</script>
</body>
</html>
